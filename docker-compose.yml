services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    labels:
      com.centurylinklabs.watchtower.enable: "true"
    env_file:
      - .env
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5

  qdrant:
    image: qdrant/qdrant:latest
    restart: unless-stopped
    labels:
      com.centurylinklabs.watchtower.enable: "true"
    ports:
      - "127.0.0.1:6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD", "/qdrant/qdrant", "--version"]
      interval: 10s
      timeout: 5s
      retries: 10

  ollama:
    image: ollama/ollama:latest
    restart: unless-stopped
    labels:
      com.centurylinklabs.watchtower.enable: "true"
    env_file:
      - .env
    environment:
      OLLAMA_CONTEXT_LENGTH: "64000"
    volumes:
      - ollama_data:/root/.ollama
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 15s
      timeout: 10s
      retries: 5

  hermes:
    image: nousresearch/hermes-agent:latest
    container_name: hermes
    restart: unless-stopped
    labels:
      com.centurylinklabs.watchtower.enable: "true"
    command: gateway run
    env_file:
      - .env
    environment:
      DISCORD_COMMAND_SYNC_POLICY: "bulk"
      DISCORD_REQUIRE_MENTION: "true"
      DISCORD_IGNORE_NO_MENTION: "true"
      DISCORD_ALLOW_BOTS: "none"
      DISCORD_AUTO_THREAD: "true"
      DISCORD_REACTIONS: "true"
    volumes:
      - hermes_data:/opt/data
      - ./hermes/config.yaml:/opt/data/config.yaml
    depends_on:
      ollama:
        condition: service_healthy

  watchtower:
    image: containrrr/watchtower:latest
    restart: unless-stopped
    command: --label-enable --cleanup --interval ${WATCHTOWER_POLL_INTERVAL:-86400}
    environment:
      DOCKER_API_VERSION: "1.40"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock

volumes:
  postgres_data:
  qdrant_data:
  ollama_data:
  hermes_data:
